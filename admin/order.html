<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order · TrendHolic Admin</title>
<link rel="stylesheet" href="/assets/portal.css">
<script src="/assets/config.js" onerror="void 0"></script>
</head>
<body>
<script type="module">
import { initPage, supabase } from "/assets/layout.js";
import { chip, money, fmtDate, escapeHtml, toast, loadingState, errorState } from "/assets/ui.js";
const page = await initPage({ portal:"admin", active:"orders", title:"Order Detail", guard:"admin" });
if(page && page.connected){
  const main = page.main; main.innerHTML = loadingState();
  const id = new URLSearchParams(location.search).get("id");
  if(!id){ main.innerHTML = errorState("No order specified"); }
  else { await draw(); }

  async function draw(){
    const { data:o, error } = await supabase.from("orders")
      .select("*, dealers(business_name,email), order_items(*), order_status_history(*)").eq("id",id).maybeSingle();
    if(error||!o){ main.innerHTML=errorState(error?.message||"Not found"); return; }
    const items=(o.order_items||[]).map(it=>`<tr>
      <td><b>${escapeHtml(it.sku_snapshot||"")}</b> · ${escapeHtml(it.product_name_snapshot||"")}</td>
      <td class="tnum">${money(it.unit_price_cents_snapshot,it.currency)}</td>
      <td class="tnum">${it.quantity}</td>
      <td class="tnum">${money(it.line_subtotal_cents_snapshot,it.currency)}</td></tr>`).join("");
    const hist=(o.order_status_history||[]).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at))
      .map(h=>`<div style="padding:6px 0;border-bottom:1px solid var(--rule);font-size:.85rem">
        ${fmtDate(h.created_at)} · <b>${escapeHtml(h.kind)}</b> → ${chip(h.new_value)} ${h.note?`<span class="hint">${escapeHtml(h.note)}</span>`:""}</div>`).join("");
    const OS=["submitted","confirmed","processing","shipped","delivered","cancelled"];
    const PS=["pending","invoice_sent","pending_payment","paid","partially_paid","refunded","cancelled"];
    main.innerHTML=`
      <div class="btn-row" style="justify-content:space-between;align-items:center">
        <h2 class="mono">${escapeHtml(o.order_number)}</h2><a class="btn btn-sm" href="/admin/orders.html">← Orders</a></div>
      <div class="grid cols-2" style="margin:14px 0">
        <div class="card"><dl class="kv">
          <dt>Dealer</dt><dd>${escapeHtml(o.dealers?.business_name||"—")}<div class="hint">${escapeHtml(o.dealers?.email||"")}</div></dd>
          <dt>Placed</dt><dd>${fmtDate(o.placed_at)}</dd>
          <dt>Order status</dt><dd>${chip(o.order_status)}</dd>
          <dt>Payment status</dt><dd>${chip(o.payment_status)}</dd>
          <dt>Tier</dt><dd>${escapeHtml(o.tier_name_snapshot||"—")}</dd>
          <dt>Subtotal</dt><dd class="tnum">${money(o.subtotal_cents,o.currency)}</dd>
          <dt>Total</dt><dd class="tnum"><b>${money(o.total_cents,o.currency)}</b></dd>
        </dl></div>
        <div class="card"><h3>Manage</h3>
          <div class="field"><label>Order status</label><select id="os">${OS.map(s=>`<option ${s===o.order_status?"selected":""}>${s}</option>`).join("")}</select></div>
          <button class="btn btn-sm btn-primary" id="saveOs">Update order status</button>
          <div class="field" style="margin-top:12px"><label>Payment status</label><select id="ps">${PS.map(s=>`<option ${s===o.payment_status?"selected":""}>${s}</option>`).join("")}</select></div>
          <button class="btn btn-sm btn-primary" id="savePs">Update payment status</button>
          <div class="form-grid" style="margin-top:12px">
            <div class="field"><label>Carrier</label><input id="carrier" value="${escapeHtml(o.carrier||"")}"></div>
            <div class="field"><label>Tracking #</label><input id="tracking" value="${escapeHtml(o.tracking_number||"")}"></div>
          </div>
          <div class="field"><label>Admin note</label><textarea id="anote">${escapeHtml(o.admin_note||"")}</textarea></div>
          <button class="btn btn-sm" id="saveMeta">Save fulfillment</button>
        </div>
      </div>
      <div class="section-title">Items (immutable snapshots)</div>
      <div class="table-wrap"><table class="data"><thead><tr><th>Product</th><th>Unit</th><th>Qty</th><th>Line subtotal</th></tr></thead><tbody>${items}</tbody></table></div>
      <div class="section-title">Status history</div><div class="card">${hist||'<span class="hint">No history</span>'}</div>`;

    document.getElementById("saveOs").onclick=async()=>{
      const { error } = await supabase.rpc("admin_set_order_status",{ p_order:id, p_status:document.getElementById("os").value, p_note:null });
      toast(error?error.message:"Order status updated",error?"crit":"good"); if(!error) draw();
    };
    document.getElementById("savePs").onclick=async()=>{
      const { error } = await supabase.rpc("admin_set_payment_status",{ p_order:id, p_status:document.getElementById("ps").value, p_note:null });
      toast(error?error.message:"Payment status updated",error?"crit":"good"); if(!error) draw();
    };
    document.getElementById("saveMeta").onclick=async()=>{
      const { error } = await supabase.rpc("admin_update_order_meta",{ p_order:id,
        p_carrier:document.getElementById("carrier").value.trim()||null,
        p_tracking:document.getElementById("tracking").value.trim()||null,
        p_admin_note:document.getElementById("anote").value.trim()||null });
      toast(error?error.message:"Saved",error?"crit":"good"); if(!error) draw();
    };
  }
}
</script>
</body>
</html>
