<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login · TrendHolic Wholesale</title>
<link rel="stylesheet" href="/assets/portal.css">
<script src="/assets/config.js" onerror="void 0"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><b>TREND</b>HOLIC</div>
    <div class="auth-sub">Admin Console</div>
    <div id="dev"></div>
    <form id="f" novalidate>
      <div class="field"><label>Email</label><input type="email" id="email" autocomplete="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="pw" autocomplete="current-password" required></div>
      <div class="field err" id="err" style="display:none"></div>
      <button class="btn btn-primary" id="go" style="width:100%">Sign in</button>
    </form>
    <div class="auth-alt">Authorized administrators only.</div>
  </div>
</div>
<script type="module">
import { hasConfig, devBanner } from "/assets/ui.js";
const err=document.getElementById("err"), go=document.getElementById("go");
if(!hasConfig()){ document.getElementById("dev").innerHTML = devBanner(); }
else {
  const { supabase } = await import("/assets/supabase.js");
  async function verifyAdminAndGo(){
    const { data:{ user } } = await supabase.auth.getUser();
    if(!user) return false;
    const { data } = await supabase.from("admin_users").select("id").eq("id", user.id).eq("is_active", true).maybeSingle();
    if(data){ window.location.replace("/admin/dashboard.html"); return true; }
    // authenticated but NOT an active admin — deny (DB-backed, not a client claim)
    await supabase.auth.signOut();
    err.textContent = "This account is not an active administrator.";
    err.style.display="block"; return false;
  }
  const { data:{ session } } = await supabase.auth.getSession();
  if(session) verifyAdminAndGo();
  document.getElementById("f").addEventListener("submit", async (e)=>{
    e.preventDefault(); err.style.display="none"; go.disabled=true; go.textContent="Signing in…";
    const { error } = await supabase.auth.signInWithPassword({ email: email.value.trim(), password: pw.value });
    if(error){ err.textContent=error.message; err.style.display="block"; go.disabled=false; go.textContent="Sign in"; return; }
    const ok = await verifyAdminAndGo();
    if(!ok){ go.disabled=false; go.textContent="Sign in"; }
  });
}
</script>
</body>
</html>
