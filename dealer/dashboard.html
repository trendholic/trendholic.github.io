<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · TrendHolic Dealer</title>
<link rel="stylesheet" href="/assets/portal.css">
<script src="/assets/config.js" onerror="void 0"></script>
</head>
<body>
<script type="module">
import { initPage, supabase } from "/assets/layout.js";
import { chip, money, fmtDate, escapeHtml, loadingState, emptyState } from "/assets/ui.js";
const page = await initPage({ portal:"dealer", active:"dashboard", title:"Dashboard", guard:"dealer" });
if(page && page.connected){
  const main = page.main; main.innerHTML = loadingState();
  const dealer = page.ctx.dealer;
  const [{ data: tier }, { data: orders }, { data: notes }] = await Promise.all([
    supabase.from("dealer_tiers").select("name").eq("id", dealer.tier_id).maybeSingle(),
    supabase.from("orders").select("id,order_number,placed_at,order_status,payment_status,total_cents,currency")
      .order("placed_at",{ascending:false}).limit(6),
    supabase.from("notifications").select("title,body,created_at,link_url,is_read")
      .order("created_at",{ascending:false}).limit(6),
  ]);
  const rows = (orders||[]).map(o=>`
    <tr class="row-link" onclick="location.href='/dealer/order.html?id=${o.id}'">
      <td class="mono">${escapeHtml(o.order_number)}</td>
      <td>${fmtDate(o.placed_at)}</td>
      <td>${chip(o.order_status)}</td>
      <td>${chip(o.payment_status)}</td>
      <td class="tnum">${money(o.total_cents,o.currency)}</td>
    </tr>`).join("");
  main.innerHTML = `
    <div class="grid cols-3" style="margin-bottom:8px">
      <div class="stat"><div class="label">Business</div><div class="value" style="font-size:1.2rem">${escapeHtml(dealer.business_name)}</div>
        <div class="sub">${chip(dealer.status)}</div></div>
      <div class="stat"><div class="label">Tier</div><div class="value" style="font-size:1.2rem">${escapeHtml(tier?.name||"—")}</div>
        <div class="sub">Wholesale pricing tier</div></div>
      <div class="stat"><div class="label">Quick actions</div>
        <div class="btn-row" style="margin-top:8px">
          <a class="btn btn-sm btn-primary" href="/dealer/catalog.html">Browse catalog</a>
          <a class="btn btn-sm" href="/dealer/cart.html">Cart</a></div></div>
    </div>
    <div class="section-title">Recent orders</div>
    <div class="table-wrap">
      <table class="data"><thead><tr><th>Order</th><th>Date</th><th>Status</th><th>Payment</th><th>Total</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="5">${emptyState("No orders yet","Your wholesale orders will appear here.")}</td></tr>`}</tbody></table>
    </div>
    <div class="section-title">Notifications</div>
    <div class="card">${(notes&&notes.length)?notes.map(n=>`
      <div style="padding:8px 0;border-bottom:1px solid var(--rule)">
        <b>${escapeHtml(n.title)}</b> <span class="hint">· ${fmtDate(n.created_at)}</span>
        ${n.body?`<div class="hint">${escapeHtml(n.body)}</div>`:""}</div>`).join("") : emptyState("No notifications")}
    </div>`;
}
</script>
</body>
</html>
