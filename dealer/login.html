<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Login · TrendHolic Wholesale</title>
<link rel="stylesheet" href="/assets/portal.css">
<script src="/assets/config.js" onerror="void 0"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><b>TREND</b>HOLIC</div>
    <div class="auth-sub">Wholesale Dealer Login</div>
    <div id="dev"></div>
    <form id="f" novalidate>
      <div class="field"><label>Email</label><input type="email" id="email" autocomplete="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="pw" autocomplete="current-password" required></div>
      <div class="field err" id="err" style="display:none"></div>
      <button class="btn btn-primary" id="go" style="width:100%">Sign in</button>
    </form>
    <div class="auth-alt">New to wholesale? <a href="/dealer/apply.html">Become a dealer</a></div>
    <div class="auth-alt"><a href="/index.html">← Back to store</a></div>
  </div>
</div>
<script type="module">
import { hasConfig, devBanner } from "/assets/ui.js";
const err = document.getElementById("err"), go = document.getElementById("go");
if(!hasConfig()){
  document.getElementById("dev").innerHTML = devBanner();
} else {
  const { supabase } = await import("/assets/supabase.js");
  const { routeDealerAfterLogin } = await import("/assets/guard.js");
  // already logged in? route onward.
  const { data:{ session } } = await supabase.auth.getSession();
  if(session) routeDealerAfterLogin(session.user);
  document.getElementById("f").addEventListener("submit", async (e)=>{
    e.preventDefault(); err.style.display="none"; go.disabled=true; go.textContent="Signing in…";
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email.value.trim(), password: pw.value });
    if(error){ err.textContent = error.message; err.style.display="block"; go.disabled=false; go.textContent="Sign in"; return; }
    await routeDealerAfterLogin(data.user);
  });
}
</script>
</body>
</html>
